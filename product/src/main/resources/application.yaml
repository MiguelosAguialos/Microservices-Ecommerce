spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import: optional:file:./configs/.env-${spring.profiles.active}[.properties]
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    url: ${PRODUCT_DATASOURCE_URL}
    username: ${PRODUCT_DB_USERNAME}
    password: ${PRODUCT_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  application:
    name: product-ms

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  #    env:
  #      show-values: always
  info:
    env:
      enabled: true

server:
  shutdown: graceful
  port: ${PRODUCT_PORT:8081}

info:
  app:
    name: product-ms
    description: Product microservice for ecommerce app
    version: 0.0.1
