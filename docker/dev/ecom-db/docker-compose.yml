services:
  user-db:
    image: postgres:latest
    container_name: user-db
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512m
    environment:
      POSTGRES_USER: "${USER_DB_USERNAME}"
      POSTGRES_PASSWORD: "${USER_DB_PASSWORD}"
      POSTGRES_DB: "${USER_DB_NAME}"
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 10s
    extends:
      file: ./common-config.yml
      service: network-deploy-service
  product-db:
    image: postgres:latest
    container_name: product-db
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512m
    environment:
      POSTGRES_USER: "${PRODUCT_DB_USERNAME}"
      POSTGRES_PASSWORD: "${PRODUCT_DB_PASSWORD}"
      POSTGRES_DB: "${PRODUCT_DB_NAME}"
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 10s
    extends:
      file: ./common-config.yml
      service: network-deploy-service
  order-db:
    image: postgres:latest
    container_name: order-db
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512m
    environment:
      POSTGRES_USER: "${ORDER_DB_USERNAME}"
      POSTGRES_PASSWORD: "${ORDER_DB_PASSWORD}"
      POSTGRES_DB: "${ORDER_DB_NAME}"
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 10s
    extends:
      file: ./common-config.yml
      service: network-deploy-service
networks:
  ecommerce:
    driver: bridge