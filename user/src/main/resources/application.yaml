spring:
  config:
    import: optional:configserver:${CONFIGSERVER_URI:http://localhost:8888}
  application:
    name: userMS
  mongodb:
    uri: ${db.url}
    database: ${db.name}
    username: ${db.username}
    password: ${db.password}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  #    env:
  #      show-values: always
  info:
    env:
      enabled: true

server:
  shutdown: graceful
  port: ${USER_PORT:8082}

info:
  app:
    name: ${info.app.name}
    description: ${info.app.description}
    version: ${info.app.version}
    profile: ${spring.profiles.active}
