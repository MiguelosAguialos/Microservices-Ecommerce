spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import: optional:file:./configs/.env-${spring.profiles.active}[.properties]
  application:
    name: user-ms
  mongodb:
    uri: ${USER_DATASOURCE_URL}
    database: ${USER_DB_NAME}
    username: ${USER_DB_USERNAME}
    password: ${USER_DB_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  #    env:
  #      show-values: always
  info:
    env:
      enabled: true

server:
  shutdown: graceful
  port: ${USER_PORT:8082}

info:
  app:
    name: user-ms
    description: User microservice for ecommerce app
    version: 0.0.1
